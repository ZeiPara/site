<!DOCTYPE html>
<html lang="ja">
  <head>
    <title>scratch 4.0 (test)</title>
    <style>
      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background-color: #d5cfff;
      }
      
      .header {
        height: 60px;
        width: 100%;
        background: linear-gradient(#3300ff, #8000ff);
        border-radius: 20px;
        display: flex;
        opacity: 0.75;
        z-index: 999;
        position: fixed;
      }

      #logo {
        height: 60px;
        margin-left: 5px;
        margin-right: 15px;
      }
      
      #create, #look, #idea, #other {
        color: #ffffff;
        margin: auto 15px;
        text-decoration: none;
        background: linear-gradient(#3300ff, #8000ff);
        font-size: 8px;
      }

      .search-wrapper {
        position: relative;
        display: inline-block;
        background-color: #400080;
        border-radius: 10px;
        height: 50px;
        width: 300px;
        margin-top: auto;
        margin-bottom: auto;
        margin-left: 10px;
      }

      .search-wrapper input {
        position: absolute;
        top: 0;
        left: 40px;
        width: calc(100% - 40px);
        height: 50px;
        font-size: 16px;
        border: none;
        outline: none;
        background: transparent;
        color: white;
      }

      .search-wrapper .icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 20px;
        height: 20px;
      }

      #setting, #message, #file, #icon {
        padding: 0 -20px;
        height: 60px;
        margin: auto 0;
        background: linear-gradient(#3300ff, #8000ff);
      }
      
      .activity {
        position: relative;
        padding: 10px;
        border-radius: 10px;
        background: linear-gradient(#f2e6ff, #ffffff);
        top: 60px;
        height: 100px;
        width: 50%;
        margin: 10px;
        z-index: 980;
      }

      .activity::before {
        content: "";
        position: absolute;
        inset: 0;
        padding: 4px;
        border-radius: 10px;
        background: linear-gradient(#8000ff, #3300ff);
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
                mask-composite: exclude;
      }

      
      .activity-text {
        position: relative;
        padding: 10px;
        border-radius: 10px;
        background: linear-gradient(#f2e6ff, #ffffff);
        top: 80px;
        height: 20px;
        width: 30%;
        margin: 10px;
        z-index: 990;
        left: 10px;
      }

      .activity-text::before {
        content: "";
        position: absolute;
        inset: 0;
        padding: 4px;
        border-radius: 10px;
        background: linear-gradient(#8000ff, #3300ff);
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
                mask-composite: exclude;
      }

      .activity-text p {
        background: linear-gradient(#3300ff, #8000ff); 
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: auto;
        padding-left: 10px
      }
    </style>
  </head>
  <body>
    <div class="header">
      <a href="https://zeipara.github.io/site/scratch4"><img src="https://zeipara.github.io/site/Scratchlogo.svg" id="logo"></a>
      <a href="#" id="create"><h1> 作る　</h1></a>
      <a href="#" id="look"><h1> 見る　</h1></a>
      <a href="#" id="idea"><h1>アイデア</h1></a>
      <a href="#" id="other"><h1> その他 </h1></a>
      <div class="search-wrapper">
        <img src="https://zeipara.github.io/site/nav-search-glass.png" class="icon">
        <input type="text" placeholder="検索">
      </div>
      <a href="#" id="setting"><img src="https://zeipara.github.io/site/Setting.svg" height=50px></a>
      <a href="#" id="message"><img src="https://zeipara.github.io/site/Message.svg" height=50px></a>
      <a href="#" id="file"><img src="https://zeipara.github.io/site/MyStaff.svg" height=50px></a>
      <a href="#" id="icon"><img src="https://zeipara.github.io/site/Icon.svg" height=50px></a>
    </div>
    <div class="activity-text">
      <p>最新の情報</p>
    </div>
    <div class="activity">
      
    </div>
  </body>
</html>
