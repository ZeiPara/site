<!DOCTYPE html>
<html lang="ja">
  <head>
    <title>scratch 4.0 (test)</title>
    <style>
      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background-color: #d5cfff;
      }
      
      .header {
        height: 60px;
        width: 100%;
        background: linear-gradient(#3300ff, #8000ff);
        border-radius: 20px;
        display: flex;   
      }

      #logo {
        height: 60px;
        margin-left: 5px;
      }

      #search {
        border-radius: 10px;
        background-color: #400080;
        height: 50px;
        width: 300px;
        margin-top: auto;
        margin-left: 10px;
        position: relative;
        display: inline-block;
      }
      
      #create, #look, #idea, #other {
        color: #ffffff;
        margin: auto 15px;
        text-decoration: none;
        background: linear-gradient(#3300ff, #8000ff);
        font-size: 8px;
      }

      .search-wrapper .icon {
        position: absolute;
        left: 8px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
      }

      .search-wrapper input {
        padding-left: 32px;
        height: 32px;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <a href="zeipara.github.io/site/scratch4"><img src="https://zeipara.github.io/site/Scratchlogo.svg" id="logo"></a>
      <a href="#" id="create"><h1> 作る　</h1></a>
      <a href="#" id="look"><h1> 見る　</h1></a>
      <a href="#" id="idea"><h1>アイデア</h1></a>
      <a href="#" id="other"><h1> その他 </h1></a>
      <div class="search">
        <img src="https://zeipara.github.io/site/nav-search-glass.png" class="icon">
        <input type="text" placeholder="検索">
      </div>
    </div>
  </body>
</html>
