<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かな漢字変換ツール (軽量高速版)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        #copyBtn { background-color: #28a745; display: none; } /* 初期状態は非表示 */
        #copyBtn:hover { background-color: #218838; }
        #result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px; min-height: 50px; white-space: pre-wrap; }
        .error-text { color: #dc3545; font-weight: bold; }
        .copy-toast { display: inline-block; margin-left: 10px; color: #28a745; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>ひらがな→漢字変換</h1>
    
    <p>ひらがなを入力してください：</p>
    <!-- 💡 onclick="this.select();" を追加しました -->
    <textarea id="inputText" placeholder="きょうはいいてんきですね。あしたもいいてんきだといいな！" onclick="this.select();"></textarea>
    
    <div class="btn-group">
        <button id="convertBtn" onclick="convertText()">変換する</button>
        <button id="copyBtn" onclick="copyResult()">結果をコピー</button>
        <span id="copyMessage" class="copy-toast"></span>
    </div>

    <h3>変換結果：</h3>
    <div id="result">ここに結果が表示されます</div>

    <script>
        // グローバルに結果を保持
        let currentResultText = "";

        // 句点で分割する関数
        function splitBySentence(text) {
            // 、。！？で句切る（句点も含める）
            const regex = /([^、。！？]*[、。！？]?)/g;
            const parts = [];
            let match;
            while ((match = regex.exec(text)) !== null) {
                if (match[1].trim()) {
                    parts.push(match[1]);
                }
            }
            return parts.length > 0 ? parts : [text];
        }

        async function convertText() {
            const inputTextArea = document.getElementById('inputText');
            const convertBtn = document.getElementById('convertBtn');
            const copyBtn = document.getElementById('copyBtn');
            const resultDiv = document.getElementById('result');
            const copyMessage = document.getElementById('copyMessage');
            
            const inputText = inputTextArea.value.trim();

            if (!inputText) {
                resultDiv.innerHTML = '<span class="error-text">❌ 文字を入力してください。</span>';
                copyMessage.textContent = "";
                return;
            }

            // UIリセット
            convertBtn.disabled = true;
            copyBtn.style.display = "none"; 
            resultDiv.textContent = "変換中...";
            copyMessage.textContent = ""; 

            try {
                // 句点で分割
                const sentences = splitBySentence(inputText);
                let resultText = "";

                for (const sentence of sentences) {
                    if (!sentence.trim()) continue;

                    const targetUrl = `https://www.google.com/transliterate?langpair=ja-Hira|ja&text=${encodeURIComponent(sentence)}`;
                    const apiUrl = `https://corsproxy.io/?url=${encodeURIComponent(targetUrl)}`;

                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 5000);

                    const response = await fetch(apiUrl, { signal: controller.signal });
                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        throw new Error(`HTTP_STATUS_${response.status}`);
                    }

                    const data = await response.json();
                    if (!data || data.length === 0) {
                        throw new Error("EMPTY_RESPONSE");
                    }
                    
                    let convertedSentence = "";
                    for (const item of data) {
                        if (item && item[1] && item[1][0]) {
                            convertedSentence += item[1][0];
                        }
                    }

                    resultText += convertedSentence;
                }

                resultDiv.textContent = resultText;
                currentResultText = resultText; // コピー用に保存

                // 💡自動コピーを試みる（ブラウザにブロックされる可能性があるのでtry-catchで囲む）
                if (resultText && navigator.clipboard) {
                    try {
                        await navigator.clipboard.writeText(resultText);
                        copyMessage.textContent = "📋 自動コピーしました！";
                        setTimeout(() => { copyMessage.textContent = ""; }, 3000);
                    } catch (e) {
                        // 通信のタイムラグで自動コピーがブロックされた場合は、緑色の「コピーボタン」を出してリカバリさせる
                        copyBtn.style.display = "inline-block";
                        copyMessage.textContent = "⚠️ ボタンを押してコピーしてください";
                    }
                }

            } catch (error) {
                let errorMessage = "";
                if (error.name === 'AbortError') {
                    errorMessage = "⏱️ タイムアウト: 変換処理に時間がかかりすぎたため中断しました。";
                } else if (error.message && error.message.startsWith('HTTP_STATUS_')) {
                    const code = error.message.replace('HTTP_STATUS_', '');
                    errorMessage = `❌ サーバーエラー: プロキシサーバーが異常を検知しました (コード: ${code})`;
                } else if (error instanceof SyntaxError) {
                    errorMessage = "⚠️ データ解析エラー: Googleから返ってきたデータの形が不正です。";
                } else {
                    errorMessage = `🔌 通信失敗: ネットワーク未接続か、アクセスが遮断されました。(${error.message})`;
                }

                resultDiv.innerHTML = `<span class="error-text"></span>`;
                resultDiv.querySelector('.error-text').textContent = errorMessage;
            } finally {
                convertBtn.disabled = false;
            }
        }

        // 💡 ユーザーが明示的にクリックするため、100%ブラウザにブロックされないコピー関数
        async function copyResult() {
            const copyMessage = document.getElementById('copyMessage');
            if (!currentResultText) return;

            try {
                await navigator.clipboard.writeText(currentResultText);
                copyMessage.textContent = "📋 コピー完了！";
                setTimeout(() => { copyMessage.textContent = ""; }, 3000);
            } catch (err) {
                copyMessage.textContent = "❌ コピーに失敗しました";
            }
        }
    </script>

</body>
</html>
