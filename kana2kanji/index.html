<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かな漢字変換ツール (安定ローカル版)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px; min-height: 50px; white-space: pre-wrap; }
        .error-text { color: #dc3545; font-weight: bold; }
        .status-text { color: #6c757d; font-style: italic; }
    </style>

    <!-- 外部のサーバーに依存しないよう、信頼性の高いCDNからJavaScriptの解析ライブラリを読み込みます -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
</head>
<body>

    <h1>ひらがな→漢字・カタカナ変換</h1>
    
    <p>ひらがな（または文章）を入力してください：</p>
    <textarea id="inputText" placeholder="にほんごをにゅうりょくしてへんかんします"></textarea>
    
    <button onclick="convertText()">変換する</button>

    <h3>変換結果：</h3>
    <div id="result" class="status-text">システム準備中... (初回は辞書の読み込みに数秒かかります)</div>

    <script>
        const kuroshiro = new Kuroshiro();
        let isInitialized = false;

        // ページを読み込んだら、裏側で辞書データをセットアップ
        async function initAnalyzer() {
            const resultDiv = document.getElementById('result');
            try {
                // Kuromoji辞書を読み込んで解析機を初期化
                await kuroshiro.init(new KuromojiAnalyzer({
                    dictPath: "https://jsdelivr.net"
                }));
                isInitialized = true;
                resultDiv.innerText = "準備完了しました。ひらがなを入力して変換してください。";
            } catch (error) {
                resultDiv.innerHTML = `<span class="error-text">❌ 辞書データの読み込みに失敗しました: ${error.message}</span>`;
            }
        }

        // 初期化の実行
        initAnalyzer();

        async function convertText() {
            const inputText = document.getElementById('inputText').value;
            const resultDiv = document.getElementById('result');

            if (!isInitialized) {
                resultDiv.innerHTML = '<span class="error-text">⚠️ まだシステムの準備ができていません。しばらくお待ちください。</span>';
                return;
            }

            if (!inputText) {
                resultDiv.innerHTML = '<span class="error-text">❌ 文字を入力してください。</span>';
                return;
            }

            resultDiv.innerText = "変換中...";

            try {
                // タイムアウトを設けて処理のフリーズを検知する try-catch 構造
                const conversionPromise = kuroshiro.convert(inputText, {
                    to: "okurigana", // 標準的な送り仮名付きの「漢字・ひらがな交じり」に変換
                    mode: "normal"
                });

                // 5秒でタイムアウトさせる
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error("TIMEOUT")), 5000)
                );

                // レスポンスの競合処理
                const convertedResult = await Promise.race([conversionPromise, timeoutPromise]);

                // Kuroshiroの送りがなモードは内部処理用にHTMLタグを吐くことがあるためクリーンアップ
                // 例: <ruby>漢字<rp>(</rp><rt>かんじ</rt><rp>)</rp></ruby> のような構造から最適な「漢字まじり文」を抽出
                const parser = new DOMParser();
                const doc = parser.parseFromString(convertedResult, 'text/html');
                
                // プレーンなテキストとして結果欄へ書き出し
                resultDiv.innerText = doc.body.textContent || doc.body.innerText;

            } catch (error) {
                // エラーの正確な仕分けと結果欄への書き出し
                let errorMessage = "";
                if (error.message === "TIMEOUT") {
                    errorMessage = "⏱️ 処理タイムアウト: 文章が長すぎるか、スマートフォンの処理が追いつきませんでした。";
                } else {
                    errorMessage = `❌ 変換エラー: ${error.message}\n文字の組み合わせを変えて試してください。`;
                }
                resultDiv.innerHTML = `<span class="error-text">${errorMessage}</span>`;
            }
        }
    </script>

</body>
</html>
