<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かな漢字変換ツール (軽量高速版)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px; min-height: 50px; white-space: pre-wrap; }
        .error-text { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

    <h1>ひらがな→漢字変換</h1>
    
    <p>ひらがなを入力してください：</p>
    <textarea id="inputText" placeholder="きょうはいいてんきですね"></textarea>
    
    <button onclick="convertText()">変換する</button>

    <h3>変換結果：</h3>
    <div id="result">ここに結果が表示されます</div>

    <script>
        async function convertText() {
            const inputText = document.getElementById('inputText').value;
            const resultDiv = document.getElementById('result');

            if (!inputText) {
                resultDiv.innerHTML = '<span class="error-text">❌ 文字を入力してください。</span>';
                return;
            }

            resultDiv.innerText = "変換中...";

            try {
                // 1. Google IMEの正規APIのURLを生成
                const targetUrl = `https://www.google.com/transliterate?langpair=ja-Hira|ja&text=${encodeURIComponent(inputText)}`;
                
                // 2. 超軽量でCORSを回避できる
                const apiUrl = `https://corsproxy.io/?url=${encodeURIComponent(targetUrl)}`;

                // タイムアウト設定（5秒）
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);

                // APIリクエストの送信
                const response = await fetch(apiUrl, { signal: controller.signal });
                clearTimeout(timeoutId);

                // HTTP自体の通信エラーチェック
                if (!response.ok) {
                    throw new Error(`HTTP_STATUS_${response.status}`);
                }

                // corsproxy.ioは生のJSONをそのまま返すので、ダイレクトにパースしてOK
                const data = await response.json();

                if (!data || data.length === 0) {
                    throw new Error("EMPTY_RESPONSE");
                }
                
                // 配列から一番有力な変換後の漢字候補を取り出して組み立てる
                let resultText = "";
                for (const item of data) {
                    if (item && item[1] && item[1][0]) {
                        resultText += item[1][0];
                    }
                }

                // 正確に結果を出力
                resultDiv.innerText = resultText;

            } catch (error) {
                // エラーの正確な仕分けと結果欄への出力
                let errorMessage = "";

                if (error.name === 'AbortError') {
                    errorMessage = "⏱️ タイムアウト: 変換処理に時間がかかりすぎたため中断しました。";
                } else if (error.message.startsWith('HTTP_STATUS_')) {
                    const code = error.message.replace('HTTP_STATUS_', '');
                    errorMessage = `❌ サーバーエラー: プロキシサーバーが異常を検知しました (コード: ${code})`;
                } else if (error instanceof SyntaxError) {
                    errorMessage = "⚠️ データ解析エラー: Googleから返ってきたデータの形が不正です。";
                } else {
                    errorMessage = `🔌 通信失敗(Load failed): ネットワーク未接続か、アクセスが遮断されました。(${error.message})`;
                }

                // 赤文字で正確に書き出し
                resultDiv.innerHTML = `<span class="error-text">${errorMessage}</span>`;
            }
        }
    </script>

</body>
</html>
