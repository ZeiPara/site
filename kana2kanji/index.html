<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かな漢字変換ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px; min-height: 50px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <h1>ひらがな→漢字変換</h1>
    
    <p>ひらがなを入力してください：</p>
    <textarea id="inputText" placeholder="（例：をつかってひらがなをかんじにへんかんするさいとをつくりたい）"></textarea>
    
    <button onclick="convertText()">変換する</button>

    <h3>変換結果：</h3>
    <div id="result">ここに結果が表示されます</div>

    <script>
        async function convertText() {
            const inputText = document.getElementById('inputText').value;
            const resultDiv = document.getElementById('result');

            if (!inputText) {
                resultDiv.innerText = "文字を入力してください。";
                return;
            }

            resultDiv.innerText = "変換中...";

            try {
                // 1. ひらがな部分をURLエンコード
                const encodedText = encodeURIComponent(inputText);
                
                // 2. ⚠️ 修正ポイント: 「ja-Hira|ja」の「|」を安全な「%7C」に手動で書き換え、URL全体の整合性を保ちます
                const langpair = encodeURIComponent("ja-Hira|ja"); 
                const apiUrl = `https://google.com{langpair}&text=${encodedText}`;

                // 3. APIリクエストを送信
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("APIの応答が正常ではありませんでした。");

                const data = await response.json();
                
                // 4. Google APIから返ってきた配列を、1つの文章に組み立てる
                let resultText = "";
                for (const item of data) {
                    // item[0] は元のひらがな、item[1][0] は最も有力な漢字変換候補
                    if (item && item[1] && item[1][0]) {
                        resultText += item[1][0];
                    }
                }

                resultDiv.innerText = resultText;

            } catch (error) {
                resultDiv.innerText = `エラーが発生しました: ${error.message}\nローカルファイルをブラウザで直接開いている場合、一部の環境で制限がかかることがあります。`;
            }
        }
    </script>

</body>
</html>
