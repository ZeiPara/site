<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かな漢字変換ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px; min-height: 50px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <h1>ひらがな→漢字変換</h1>
    
    <p>ひらがなを入力してください：</p>
    <textarea id="inputText" placeholder="きょうはいい天気ですね"></textarea>
    
    <button onclick="convertText()">変換する</button>

    <h3>変換結果：</h3>
    <div id="result">ここに結果が表示されます</div>

    <script>
        async function convertText() {
            const inputText = document.getElementById('inputText').value;
            const resultDiv = document.getElementById('result');

            if (!inputText) {
                resultDiv.innerText = "文字を入力してください。";
                return;
            }

            resultDiv.innerText = "変換中...";

            try {
                // GoogleのIME変換APIの正しいURL（CORS回避のためにプロキシを経由）
                const targetUrl = `https://google.com|ja&text=${encodeURIComponent(inputText)}`;
                const apiUrl = `https://corsproxy.io{encodeURIComponent(targetUrl)}`;

                // APIリクエストを送信
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("APIの応答が正常ではありませんでした。");

                const data = await response.json();
                
                // 配列から変換結果を組み立てる
                let resultText = "";
                for (const item of data) {
                    if (item && item[1] && item[1][0]) {
                        resultText += item[1][0]; // 最も有力な変換候補を結合
                    }
                }

                resultDiv.innerText = resultText;

            } catch (error) {
                resultDiv.innerText = `エラーが発生しました: ${error.message}\nインターネット接続を確認するか、しばらく時間を置いて試してください。`;
            }
        }
    </script>

</body>
</html>
