<!DOCTYPE html>
<html>
  <head>
    <title>kana2kanji</title>
  </head>
  <body>
    <input id="kana">
    <button onclick="clicked()">convert</button>
    <div id="answer"></div>
    <script>
      async function clicked() {
        const kana = document.querySelector("#kana");
        const content = kana.value;
        const fetched = await fetch(`https://api.excelapi.org/language/kana2kanji?text=${content}`);
        const result = await fetched.json();
        const answer = document.querySelector("#answer");
        answer.innerHTML = result;
      }
    </script>
  </body>
</html>
