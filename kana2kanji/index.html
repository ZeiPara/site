<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイムかな漢字変換ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; box-sizing: border-box; font-size: 16px; }
        #status { font-size: 14px; color: #666; margin-bottom: 5px; min-height: 20px; }
        #result { padding: 15px; background: #f0f0f0; border-radius: 5px; min-height: 50px; white-space: pre-wrap; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>リアルタイムかな漢字変換</h1>
    
    <p>ひらがなを入力してください（タイピングが止まると自動変換します）：</p>
    <!-- ⚠️ 修正ポイント: 入力されるたびに「handleInput()」を実行する -->
    <textarea id="inputText" oninput="handleInput()" placeholder="例：をつかってひらがなをかんじにへんかんするさいとをつくりたい"></textarea>
    
    <div id="status"></div>
    <h3>変換結果：</h3>
    <div id="result">ここに結果が表示されます</div>

    <script>
        let timeoutId = null; // タイマーのIDを記憶する変数

        // 1. 入力を監視する関数（デバウンス処理）
        function handleInput() {
            const statusDiv = document.getElementById('status');
            
            // ユーザーが文字を打っている間は、前のタイマーをキャンセルする
            clearTimeout(timeoutId);

            statusDiv.innerText = "入力中...";

            // ⚠️ 修正ポイント: タイピングが止まってから「500ミリ秒（0.5秒）」後に変換を実行
            timeoutId = setTimeout(() => {
                convertText();
            }, 500); 
        }

        // 2. 実際にAPIを叩いて変換する関数
        async function convertText() {
            const inputText = document.getElementById('inputText').value;
            const resultDiv = document.getElementById('result');
            const statusDiv = document.getElementById('status');

            if (!inputText.trim()) {
                resultDiv.innerText = "ここに結果が表示されます";
                statusDiv.innerText = "";
                return;
            }

            statusDiv.innerText = "変換中...";

            try {
                const encodedText = encodeURIComponent(inputText);
                const langpair = encodeURIComponent("ja-Hira|ja"); 
                const apiUrl = `https://google.com{langpair}&text=${encodedText}`;

                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("APIエラー");

                const data = await response.json();
                
                let resultText = "";
                for (const item of data) {
                    if (item && item[0] && item[1] && item[1][0]) {
                        resultText += item[1][0];
                    }
                }

                resultDiv.innerText = resultText;
                statusDiv.innerText = "変換完了";

            } catch (error) {
                statusDiv.innerText = "エラーが発生しました";
                resultDiv.innerText = `エラー: ${error.message}`;
            }
        }
    </script>

</body>
</html>
