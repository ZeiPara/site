<!DOCTYPE html>
<html>
  <head>
    <title>kana2kanji</title>
  </head>
  <body>
    <input id="kana" placeholder="ひらがなを入力してください">
    <button onclick="clicked()">convert</button>
    <div id="answer"></div>
    <script>
      async function clicked() {
        const kana = document.querySelector("#kana");
        const content = kana.value;
        const answer = document.querySelector("#answer");
        
        if (!content.trim()) {
          answer.textContent = "テキストを入力してください";
          return;
        }
        
        try {
          answer.textContent = "変換中...";
          const fetched = await fetch(`https://api.excelapi.org/language/kana2kanji?text=${encodeURIComponent(content)}`);
          
          if (!fetched.ok) {
            throw new Error(`HTTPエラー: ${fetched.status}`);
          }
          
          // APIはテキストを返すので、text()で取得
          const result = await fetched.text();
          
          console.log("APIレスポンス:", result);
          
          answer.textContent = result;
        } catch (error) {
          console.error("エラー:", error);
          answer.textContent = `エラーが発生しました: ${error.message}`;
        }
      }
    </script>
  </body>
</html>
