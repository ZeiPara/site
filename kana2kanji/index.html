<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かな漢字変換ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px; min-height: 50px; white-space: pre-wrap; }
        .error-text { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

    <h1>ひらがな→漢字変換</h1>
    
    <p>ひらがなを入力してください：</p>
    <textarea id="inputText" placeholder="きょうはいいてんきですね"></textarea>
    
    <button onclick="convertText()">変換する</button>

    <h3>変換結果：</h3>
    <div id="result">ここに結果が表示されます</div>

    <script>
        async function convertText() {
            const inputText = document.getElementById('inputText').value;
            const resultDiv = document.getElementById('result');

            if (!inputText) {
                resultDiv.innerHTML = '<span class="error-text">❌ 文字を入力してください。</span>';
                return;
            }

            resultDiv.innerText = "変換中...";

            try {
                // GoogleのIME変換APIの正しいURL（CORS回避のためにプロキシを経由）
                const targetUrl = `https://www.google.com/transliterate?langpair=ja-Hira|ja&text=${encodeURIComponent(inputText)}`;
                const apiUrl = `https://corsproxy.io{encodeURIComponent(targetUrl)}`;

                // 1. ネットワークリクエストのタイムアウト設定（5秒）
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);

                // APIリクエストを送信
                const response = await fetch(apiUrl, { signal: controller.signal });
                clearTimeout(timeoutId);

                // 2. HTTPステータスコードのチェック（404や500エラーの検知）
                if (!response.ok) {
                    throw new Error(`HTTP_ERROR:${response.status}`);
                }

                const data = await response.json();
                
                // 配列から変換結果を組み立てる
                let resultText = "";
                for (const item of data) {
                    // item[1][0] が最も有力な漢字変換候補
                    if (item && item[1] && item[1][0]) {
                        resultText += item[1][0];
                    }
                }

                // 結果を出力
                resultDiv.innerText = resultText;

            } catch (error) {
                // 3. エラー原因を細かく分析して結果欄に出力
                let errorMessage = "";

                if (error.name === 'AbortError') {
                    errorMessage = "⏱️ タイムアウト: サーバーからの応答が遅いため、通信を遮断しました。";
                } else if (error.message.startsWith('HTTP_ERROR:')) {
                    const status = error.message.split(':')[1];
                    errorMessage = `❌ サーバーエラー: 宛先サーバーがエラーを返しました（ステータスコード: ${status}）。`;
                } else if (error instanceof TypeError) {
                    errorMessage = "🔌 通信失敗(Load failed): ネットワークに接続されていないか、プロキシサーバー（corsproxy.io）が一時的に落ちている可能性があります。";
                } else {
                    errorMessage = `⚠️ 予期せぬエラー: ${error.message}`;
                }

                // 赤文字で結果欄に書き出す
                resultDiv.innerHTML = `<span class="error-text">${errorMessage}</span>`;
            }
        }
    </script>

</body>
</html>
