<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かな漢字変換ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px; min-height: 50px; white-space: pre-wrap; }
        .error-text { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

    <h1>ひらがな→漢字変換</h1>
    
    <p>ひらがなを入力してください：</p>
    <textarea id="inputText" placeholder="きょうはいいてんきですね"></textarea>
    
    <button onclick="convertText()">変換する</button>

    <h3>変換結果：</h3>
    <div id="result">ここに結果が表示されます</div>

    <script>
        function convertText() {
            const inputText = document.getElementById('inputText').value;
            const resultDiv = document.getElementById('result');

            if (!inputText) {
                resultDiv.innerHTML = '<span class="error-text">❌ 文字を入力してください。</span>';
                return;
            }

            resultDiv.innerText = "変換中...";

            // 以前の古いスクリプトタグが残っていたら削除する
            const oldScript = document.getElementById('google-ime-jsonp');
            if (oldScript) oldScript.remove();

            // グローバルに関数を定義して、Googleからの結果を受け取れるようにする
            window.onGoogleImeResult = function(data) {
                try {
                    let resultText = "";
                    for (const item of data) {
                        // item[1][0] が最も有力な漢字変換候補
                        if (item && item[1] && item[1][0]) {
                            resultText += item[1][0];
                        }
                    }
                    resultDiv.innerText = resultText;
                } catch (e) {
                    resultDiv.innerHTML = `<span class="error-text">❌ データ解析エラー: ${e.message}</span>`;
                }
                // 使い終わった関数をクリア
                delete window.onGoogleImeResult;
            };

            // タイムアウト監視用のタイマー（5秒）
            const timeoutId = setTimeout(() => {
                if (window.onGoogleImeResult) {
                    resultDiv.innerHTML = '<span class="error-text">⏱️ タイムアウト: Googleから応答がありません。</span>';
                    delete window.onGoogleImeResult;
                }
            }, 5000);

            try {
                // JSONP用のスクリプトタグを生成
                const script = document.createElement('script');
                script.id = 'google-ime-jsonp';
                
                // callbackパラメータに上で作った関数名を指定することでCORSを回避
                script.src = `https://google.com|ja&text=${encodeURIComponent(inputText)}&callback=onGoogleImeResult`;
                
                // スクリプトの読み込み自体が失敗した場合のエラーハンドリング
                script.onerror = function() {
                    clearTimeout(timeoutId);
                    resultDiv.innerHTML = '<span class="error-text">🔌 通信失敗: Google APIへのアクセスがブロックされたか、オフラインです。</span>';
                    delete window.onGoogleImeResult;
                };

                // ページに差し込んで実行
                document.body.appendChild(script);

            } catch (error) {
                clearTimeout(timeoutId);
                resultDiv.innerHTML = `<span class="error-text">⚠️ 予期せぬエラー: ${error.message}</span>`;
            }
        }
    </script>

</body>
</html>
