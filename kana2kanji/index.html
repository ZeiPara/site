<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>kana2kanji</title>
  </head>
  <body>
    <input id="kana" placeholder="ひらがなを入力してください">
    <button onclick="clicked()">convert</button>
    <div id="answer"></div>
    <script>
      async function clicked() {
        const kana = document.querySelector("#kana");
        const content = kana.value;
        const answer = document.querySelector("#answer");

        if (!content.trim()) {
          answer.textContent = "テキストを入力してください";
          return;
        }

        try {
          answer.textContent = "変換中...";
          const apiUrl = `https://api.excelapi.org/language/kana2kanji?text=${encodeURIComponent(content)}`;
          // allorigins を経由して生の本文を取得
          const proxy = "https://api.allorigins.win/raw?url=";
          const fetched = await fetch(proxy + encodeURIComponent(apiUrl));

          if (!fetched.ok) {
            const body = await fetched.text().catch(() => "(no body)");
            throw new Error(`HTTPエラー: ${fetched.status} ${fetched.statusText} - ${body}`);
          }

          const result = await fetched.text();
          console.log("APIレスポンス:", result);
          answer.textContent = result;
        } catch (error) {
          console.error("エラー詳細:", error);
          answer.textContent = `エラーが発生しました: ${error && error.message ? error.message : error}`;
        }
      }
    </script>
  </body>
</html>
