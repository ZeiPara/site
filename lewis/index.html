<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>21x21 ルイス構造式ジェネレーター</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --cell-size: 32px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        p.description {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-main);
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .btn:hover {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-danger {
            color: #ef4444;
            border-color: #fca5a5;
        }

        .btn-danger:hover {
            background-color: #fef2f2;
        }

        /* Canvas Container */
        .grid-container {
            position: relative;
            background: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 20px;
            overflow: auto;
            max-width: 100%;
        }

        #lewis-grid {
            display: grid;
            grid-template-columns: repeat(21, var(--cell-size));
            grid-template-rows: repeat(21, var(--cell-size));
            gap: 0;
            user-select: none;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            position: relative;
            cursor: pointer;
            border: 1px solid transparent; /* 枠線は非描画（デバッグ用・ホバー時のみ可視化） */
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: background-color 0.15s;
        }

        .cell:hover {
            background-color: rgba(59, 130, 246, 0.08);
            border-color: rgba(59, 130, 246, 0.2);
        }

        /* 元素記号テキスト */
        .element-symbol {
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Georgia', 'Times New Roman', serif;
            z-index: 2;
            pointer-events: none;
        }

        /* ドット（電子）表示 */
        .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: #000;
            border-radius: 50%;
            z-index: 3;
            pointer-events: none;
        }

        /* 上下左右の電子の配置 */
        /* 上 */
        .dot-top-1 { top: 2px; left: 50%; transform: translateX(-50%); }
        .dot-top-2a { top: 2px; left: 35%; transform: translateX(-50%); }
        .dot-top-2b { top: 2px; left: 65%; transform: translateX(-50%); }

        /* 下 */
        .dot-bottom-1 { bottom: 2px; left: 50%; transform: translateX(-50%); }
        .dot-bottom-2a { bottom: 2px; left: 35%; transform: translateX(-50%); }
        .dot-bottom-2b { bottom: 2px; left: 65%; transform: translateX(-50%); }

        /* 左 */
        .dot-left-1 { left: 2px; top: 50%; transform: translateY(-50%); }
        .dot-left-2a { left: 2px; top: 35%; transform: translateY(-50%); }
        .dot-left-2b { left: 2px; top: 65%; transform: translateY(-50%); }

        /* 右 */
        .dot-right-1 { right: 2px; top: 50%; transform: translateY(-50%); }
        .dot-right-2a { right: 2px; top: 35%; transform: translateY(-50%); }
        .dot-right-2b { right: 2px; top: 65%; transform: translateY(-50%); }

        /* 結合線 */
        .bond-h {
            position: absolute;
            height: 2px;
            background-color: #1e293b;
            z-index: 1;
            pointer-events: none;
        }

        .bond-v {
            position: absolute;
            width: 2px;
            background-color: #1e293b;
            z-index: 1;
            pointer-events: none;
        }

        /* モーダルダイアログ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: white;
            padding: 24px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            transform: translateY(10px);
            transition: transform 0.2s ease;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 1.2rem;
            margin-bottom: 16px;
            color: var(--text-main);
            text-align: center;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .form-group input[type="text"],
        .form-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
        }

        .form-group input[type="text"]:focus,
        .form-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .electron-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        .modal-actions .btn {
            flex: 1;
        }

        /* レスポンシブ調整 */
        @media (max-width: 768px) {
            :root {
                --cell-size: 24px;
            }
            .element-symbol {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>21×21 ルイス構造式ジェネレーター</h1>
        <p class="description">マス目をタップして元素記号と電子を入力してください。隣接する電子は自動で結合線になります。</p>
    </header>

    <div class="controls">
        <button class="btn" onclick="loadPreset('H2O')">水 (H₂O)</button>
        <button class="btn" onclick="loadPreset('CO2')">二酸化炭素 (CO₂)</button>
        <button class="btn" onclick="loadPreset('CH4')">メタン (CH₄)</button>
        <button class="btn btn-danger" onclick="clearGrid()">クリア</button>
    </div>

    <div class="grid-container">
        <div id-="lewis-grid" id="lewis-grid"></div>
    </div>

    <!-- 入力モーダル -->
    <div class="modal-overlay" id="input-modal">
        <div class="modal">
            <h3 class="modal-title" id="modal-cell-pos">マスの編集 (0, 0)</h3>
            
            <div class="form-group">
                <label for="element-input">元素記号 (例: H, C, O, N)</label>
                <input type="text" id="element-input" placeholder="例: O" maxlength="3">
            </div>

            <div class="electron-grid">
                <div class="form-group">
                    <label for="e-top">上部の電子数</label>
                    <select id="e-top">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="e-bottom">下部の電子数</label>
                    <select id="e-bottom">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="e-left">左側の電子数</label>
                    <select id="e-left">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="e-right">右側の電子数</label>
                    <select id="e-right">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                    </select>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-danger" onclick="clearCurrentCell()">削除</button>
                <button class="btn" onclick="closeModal()">キャンセル</button>
                <button class="btn btn-primary" onclick="saveCellData()">保存</button>
            </div>
        </div>
    </div>

    <script>
        const GRID_SIZE = 21;
        // 21x21のグリッドデータを保持する2次元配列
        // { symbol: '', top: 0, right: 0, bottom: 0, left: 0 }
        let gridData = Array(GRID_SIZE).fill(null).map(() => 
            Array(GRID_SIZE).fill(null).map(() => ({ symbol: '', top: 0, right: 0, bottom: 0, left: 0 }))
        );

        let selectedRow = -1;
        let selectedCol = -1;

        // 初期化
        document.addEventListener('DOMContentLoaded', () => {
            createGridUI();
            loadPreset('H2O'); // デフォルトで水を表示
        });

        function createGridUI() {
            const gridContainer = document.getElementById('lewis-grid');
            gridContainer.innerHTML = '';

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.addEventListener('click', () => openModal(r, c));
                    gridContainer.appendChild(cell);
                }
            }
        }

        function openModal(r, c) {
            selectedRow = r;
            selectedCol = c;
            const data = gridData[r][c];

            document.getElementById('modal-cell-pos').innerText = `マス目の編集 (${r + 1}, ${c + 1})`;
            document.getElementById('element-input').value = data.symbol;
            document.getElementById('e-top').value = data.top;
            document.getElementById('e-bottom').value = data.bottom;
            document.getElementById('e-left').value = data.left;
            document.getElementById('e-right').value = data.right;

            document.getElementById('input-modal').classList.add('active');
            document.getElementById('element-input').focus();
        }

        function closeModal() {
            document.getElementById('input-modal').classList.remove('active');
        }

        function saveCellData() {
            if (selectedRow === -1 || selectedCol === -1) return;

            const symbol = document.getElementById('element-input').value.trim();
            const top = parseInt(document.getElementById('e-top').value, 10);
            const bottom = parseInt(document.getElementById('e-bottom').value, 10);
            const left = parseInt(document.getElementById('e-left').value, 10);
            const right = parseInt(document.getElementById('e-right').value, 10);

            gridData[selectedRow][selectedCol] = { symbol, top, bottom, left, right };

            closeModal();
            render();
        }

        function clearCurrentCell() {
            if (selectedRow === -1 || selectedCol === -1) return;
            gridData[selectedRow][selectedCol] = { symbol: '', top: 0, bottom: 0, left: 0, right: 0 };
            closeModal();
            render();
        }

        function clearGrid() {
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    gridData[r][c] = { symbol: '', top: 0, bottom: 0, left: 0, right: 0 };
                }
            }
            render();
        }

        function render() {
            const cells = document.querySelectorAll('.cell');
            
            cells.forEach(cell => {
                const r = parseInt(cell.dataset.row, 10);
                const c = parseInt(cell.dataset.col, 10);
                const data = gridData[r][c];

                cell.innerHTML = ''; // セルをクリア

                if (!data.symbol) return;

                // 元素記号を表示
                const symbolEl = document.createElement('span');
                symbolEl.className = 'element-symbol';
                symbolEl.innerText = data.symbol;
                cell.appendChild(symbolEl);

                // 隣接するセルとの共有結合状態をチェック
                // 右側との結合チェック
                const rightNeighbor = (c + 1 < GRID_SIZE) ? gridData[r][c + 1] : null;
                const connectedRight = rightNeighbor && rightNeighbor.symbol && data.right > 0 && rightNeighbor.left > 0;
                const rightBondCount = connectedRight ? Math.min(data.right, rightNeighbor.left) : 0;

                // 下側との結合チェック
                const bottomNeighbor = (r + 1 < GRID_SIZE) ? gridData[r + 1][c] : null;
                const connectedBottom = bottomNeighbor && bottomNeighbor.symbol && data.bottom > 0 && bottomNeighbor.top > 0;
                const bottomBondCount = connectedBottom ? Math.min(data.bottom, bottomNeighbor.top) : 0;

                // --- ドット描画 ---
                // 上
                renderDots(cell, data.top, 'top');
                // 下（結合していない電子のみ描画）
                renderDots(cell, connectedBottom ? data.bottom - bottomBondCount : data.bottom, 'bottom');
                // 左
                renderDots(cell, data.left, 'left');
                // 右（結合していない電子のみ描画）
                renderDots(cell, connectedRight ? data.right - rightBondCount : data.right, 'right');

                // --- 結合線描画 ---
                // 右方向への結合線
                if (rightBondCount > 0) {
                    drawHorizontalBond(cell, rightBondCount);
                }
                // 下方向への結合線
                if (bottomBondCount > 0) {
                    drawVerticalBond(cell, bottomBondCount);
                }
            });
        }

        function renderDots(container, count, position) {
            if (count === 1) {
                const dot = document.createElement('div');
                dot.className = `dot dot-${position}-1`;
                container.appendChild(dot);
            } else if (count === 2) {
                const dot1 = document.createElement('div');
                dot1.className = `dot dot-${position}-2a`;
                const dot2 = document.createElement('div');
                dot2.className = `dot dot-${position}-2b`;
                container.appendChild(dot1);
                container.appendChild(dot2);
            }
        }

        function drawHorizontalBond(cell, count) {
            // セルの中心から右隣のセルの中心まで伸びる線
            if (count === 1) {
                const bond = document.createElement('div');
                bond.className = 'bond-h';
                bond.style.width = '100%';
                bond.style.left = '50%';
                bond.style.top = 'calc(50% - 1px)';
                cell.appendChild(bond);
            } else if (count === 2) {
                const bond1 = document.createElement('div');
                bond1.className = 'bond-h';
                bond1.style.width = '100%';
                bond1.style.left = '50%';
                bond1.style.top = 'calc(50% - 4px)';
                
                const bond2 = document.createElement('div');
                bond2.className = 'bond-h';
                bond2.style.width = '100%';
                bond2.style.left = '50%';
                bond2.style.top = 'calc(50% + 2px)';

                cell.appendChild(bond1);
                cell.appendChild(bond2);
            } else if (count >= 3) {
                for (let offset of [-5, -1, 3]) {
                    const bond = document.createElement('div');
                    bond.className = 'bond-h';
                    bond.style.width = '100%';
                    bond.style.left = '50%';
                    bond.style.top = `calc(50% + ${offset}px)`;
                    cell.appendChild(bond);
                }
            }
        }

        function drawVerticalBond(cell, count) {
            // セルの中心から下隣のセルの中心まで伸びる線
            if (count === 1) {
                const bond = document.createElement('div');
                bond.className = 'bond-v';
                bond.style.height = '100%';
                bond.style.top = '50%';
                bond.style.left = 'calc(50% - 1px)';
                cell.appendChild(bond);
            } else if (count === 2) {
                const bond1 = document.createElement('div');
                bond1.className = 'bond-v';
                bond1.style.height = '100%';
                bond1.style.top = '50%';
                bond1.style.left = 'calc(50% - 4px)';

                const bond2 = document.createElement('div');
                bond2.className = 'bond-v';
                bond2.style.height = '100%';
                bond2.style.top = '50%';
                bond2.style.left = 'calc(50% + 2px)';

                cell.appendChild(bond1);
                cell.appendChild(bond2);
            } else if (count >= 3) {
                for (let offset of [-5, -1, 3]) {
                    const bond = document.createElement('div');
                    bond.className = 'bond-v';
                    bond.style.height = '100%';
                    bond.style.top = '50%';
                    bond.style.left = `calc(50% + ${offset}px)`;
                    cell.appendChild(bond);
                }
            }
        }

        // プリセットデータの読み込み
        function loadPreset(type) {
            clearGrid();
            const mid = Math.floor(GRID_SIZE / 2);

            if (type === 'H2O') {
                // 水分子 (H - O - H)
                gridData[mid][mid] = { symbol: 'O', top: 2, bottom: 2, left: 1, right: 1 };
                gridData[mid][mid - 1] = { symbol: 'H', top: 0, bottom: 0, left: 0, right: 1 };
                gridData[mid][mid + 1] = { symbol: 'H', top: 0, bottom: 0, left: 1, right: 0 };
            } else if (type === 'CO2') {
                // 二酸化炭素 (O = C = O)
                gridData[mid][mid] = { symbol: 'C', top: 0, bottom: 0, left: 2, right: 2 };
                gridData[mid][mid - 1] = { symbol: 'O', top: 2, bottom: 2, left: 0, right: 2 };
                gridData[mid][mid + 1] = { symbol: 'O', top: 2, bottom: 2, left: 2, right: 0 };
            } else if (type === 'CH4') {
                // メタン (CH4)
                gridData[mid][mid] = { symbol: 'C', top: 1, bottom: 1, left: 1, right: 1 };
                gridData[mid - 1][mid] = { symbol: 'H', top: 0, bottom: 1, left: 0, right: 0 };
                gridData[mid + 1][mid] = { symbol: 'H', top: 1, bottom: 0, left: 0, right: 0 };
                gridData[mid][mid - 1] = { symbol: 'H', top: 0, bottom: 0, left: 0, right: 1 };
                gridData[mid][mid + 1] = { symbol: 'H', top: 0, bottom: 0, left: 1, right: 0 };
            }

            render();
        }
    </script>
</body>
</html>
