            background: #cbd5e0;

        }

            color: #2b6cb0;
            background: #fff;

        }

            gap: 10px;
            justify-content: center;
        }
        button.action-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;

        .btn-submit { background: #48bb78; color: white; }

        .btn-next { background: #4299e1; color: white; }

            border-radius: 6px;
            text-align: center;
            font-weight: bold;

            padding: 15px;
            border-radius: 6px;

            font-size: 16px;
            font-weight: bold;
            color: #2d3748;
            border-bottom: 2px solid #cbd5e0;
            padding-bottom: 5px;
            margin-bottom: 15px;

            color: #a0aec0;
            font-size: 20px;

            padding: 3px 10px;

</head>

<div class="container">
    <h1>歴史出来事 並び替えクイズ</h1>

    <div class="quiz-box" id="quiz-box"></div>
    
    <div class="answer-area">
        <div class="answer-box" id="box0"></div>

        <div class="answer-box" id="box2"></div>
        <div class="answer-box" id="box3"></div>
    </div>
    
    <div class="btn-group">

        <button class="action-btn btn-next" onclick="generateQuiz()">次の問題</button>
    </div>
    
    <div class="result" id="result"></div>

    </div>
    
    <div class="explanation" id="explanation"></div>
</div>

let currentSelection = [];
let correctOrder = "";
let userAnswers = [];
let labelToItemMap = {};

function generateQuiz() {
    document.getElementById("result").style.display = "none";
    document.getElementById("explanation").style.display = "none";
    document.getElementById("text-output-area").style.display = "none";
    userAnswers = [];
    labelToItemMap = {};
    updateAnswerDisplay();
    
    let shuffled = [...historyData].sort(() => 0.5 - Math.random());
    currentSelection = shuffled.slice(0, 4);
    
    // 小数点（year）を含めた正確な昇順ソートを実行
    let sortedSelection = [...currentSelection].sort((a, b) => a.year - b.year);
    
    let labels = ["A", "B", "C", "D"];
    let displayItems = [];
    
    for(let i=0; i<4; i++) {
        displayItems.push({
            label: labels[i],
            name: currentSelection[i].name,
            year: currentSelection[i].year
        });
        labelToItemMap[labels[i]] = currentSelection[i];
    }
    
    correctOrder = sortedSelection.map(sortedItem => {
        return displayItems.find(dispItem => dispItem.name === sortedItem.name).label;
    }).join("");
    
    let quizBox = document.getElementById("quiz-box");
    quizBox.innerHTML = "";
    displayItems.forEach(item => {
        quizBox.innerHTML += `
            <button class="quiz-btn" id="btn-${item.label}" onclick="selectItem('${item.label}')">
                <span class="label">${item.label}</span> ${item.name}
            </button>`;
    });
}

function selectItem(label) {
    let btn = document.getElementById(`btn-${label}`);
    let index = userAnswers.indexOf(label);
    
    if (index > -1) {
        userAnswers.splice(index, 1);
        btn.classList.remove("selected");
    } else {
        if (userAnswers.length < 4) {
            userAnswers.push(label);
            btn.classList.add("selected");
        }
    }
    updateAnswerDisplay();
}

function updateAnswerDisplay() {
    for (let i = 0; i < 4; i++) {
        let box = document.getElementById(`box${i}`);
        if (userAnswers[i]) {
            box.innerText = userAnswers[i];
            box.classList.add("filled");
        } else {
            box.innerText = "";
            box.classList.remove("filled");
        }
    }
}

function checkAnswer() {
    let resultDiv = document.getElementById("result");
    let expDiv = document.getElementById("explanation");
    let outputArea = document.getElementById("text-output-area");
    let outputBox = document.getElementById("text-output-box");
    
    if (userAnswers.length < 4) {
        alert("選択肢を4つすべて選んでから答え合わせをしてください。");
        return;
    }
    
    let userAnsStr = userAnswers.join("");
    
    if (userAnsStr === correctOrder) {
        resultDiv.className = "result correct";
        resultDiv.innerHTML = "🎉 正解です！素晴らしい！";
    } else {
        resultDiv.className = "result incorrect";
        resultDiv.innerHTML = `❌ 不正解... 正解は「 <strong>${correctOrder}</strong> 」です。`;
    }
    resultDiv.style.display = "block";
    
    let userFlowText = userAnswers.map(label => labelToItemMap[label].name).join("→");
    
    let sorted = [...currentSelection].sort((a, b) => a.year - b.year);
    let correctFlowText = sorted.map(item => item.name).join("→");
    
    // 指定フォーマットに出力テキストを流し込む
    outputBox.value = `回答:${userAnsStr}（${userFlowText}）、正当:${correctOrder}（${correctFlowText}）`;
    outputArea.style.display = "block";
    
    let expHtml = "<div class='flow-title'>🧭 この4つの時代の流れ（因果関係）</div>";
    sorted.forEach((item, index) => {
        let displayYear = Math.floor(item.year);
        // BCや特別な表記にしたい場合は調整可能ですが、基本は西暦表示
        let yearText = displayYear + "年";
        
        expHtml += `
            <div class="flow-step">
                <span class="year">${yearText}</span>
                <span class="name">${item.name}</span>
            </div>
        `;
        if (index < sorted.length - 1) {
            expHtml += `
                <div class="flow-arrow">
                    ↓<br>
                    <div class="flow-connect-text">${item.nextFlow}</div>
                </div>
            `;
        }
    });
    
    expDiv.innerHTML = expHtml;
    expDiv.style.display = "block";
}

window.onload = generateQuiz;
